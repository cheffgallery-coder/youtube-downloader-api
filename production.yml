## Optimized for Railway production deployment
## This file is loaded via YDA_CONFIG_FILE_PATH=production.yml

#### API-INFO
api_title : Youtube-Downloader-API

api_description : docs/DESCRIPTION.md

api_terms_of_service : https://turnmp3-ytdlp-test-production.up.railway.app/terms-of-service

contact_name : YoutubeDownloader

contact_email : user@localhost.dev

contact_url : https://turnmp3-ytdlp-test-production.up.railway.app/user

frontend_dir:

### API CONFIGURATIONS ###########
database_engine : sqlite:///db.sqlite3

po_token :

visitorData :

cookiefile :

proxy :

filename_prefix : TurnMp3

working_directory : static

clear_temps : true

search_limit : 50

# Use mp4 for TurnMp3 testing
default_extension : mp4

# IMPORTANT: Enable logs so we can see exact yt-dlp download error
enable_logging : true

### STATIC SERVER CONFIGS ####

# Public Railway URL, used for returned downloadable links
static_server_url : https://turnmp3-ytdlp-test-production.up.railway.app/static

serve_frontend_from_static_server: false

api_base_url : https://turnmp3-ytdlp-test-production.up.railway.app

#### DOWNLOAD OPTIONS ####

default_audio_format : m4a

video_info_cache_period_in_hrs : 4

http_chunk_size : 4096

concurrent_fragment_downloads : 1

noresizebuffer : false

retries : 10

continuedl : true

noprogress : true

nopart : false

updatetime : false

# IMPORTANT: Enable verbose logs for debugging download 500 errors
verbose : true

# IMPORTANT: Must be false so logs actually print in Railway deploy logs
quiet : false

allow_multiple_video_streams : false

allow_multiple_audio_streams : false

geo_bypass : false

# POST-DOWNLOAD OPTIONS

embed_subtitles : false

append_id_in_filename : true

# Deno JS runtime for yt-dlp signature/nsig handling
js_runtime : /root/.deno/bin/deno

js_runtime_name : deno

# Whether to clear downloaded contents on shutdown/startup or not
clear_downloaded_contents : true
